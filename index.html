<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>DailyLog — Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0f14;
  --surface:#151820;
  --surface2:#1c2030;
  --border:#252a3a;
  --accent:#5c6ef8;
  --accent2:#f85c8a;
  --green:#3ddc84;
  --amber:#f8b84a;
  --text:#e8eaf2;
  --muted:#7d86a8;
  --radius:14px;
  --radius2:10px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(21,24,32,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:18px 28px;

  display:flex;
  align-items:center;
  gap:14px;
}

.logo-icon{
  width:42px;
  height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#7585ff);

  display:grid;
  place-items:center;
  font-size:18px;
}

.logo-title{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:22px;
}

.logo-title span{
  color:var(--accent);
}

.header-sub{
  margin-left:auto;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:.08em;
}

/* LAYOUT */

.main{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;

  display:grid;
  grid-template-columns:400px 1fr;
  gap:24px;
}

@media(max-width:850px){
  .main{
    grid-template-columns:1fr;
  }

  header{
    padding:16px;
  }
}

/* PANEL */

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}

.panel-header{
  padding:18px 20px;
  border-bottom:1px solid var(--border);

  display:flex;
  align-items:center;
  gap:10px;
}

.panel-icon{
  width:34px;
  height:34px;
  border-radius:10px;

  display:grid;
  place-items:center;
}

.panel-title{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:16px;
}

.panel-body{
  padding:20px;
}

/* FORM */

.field{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:8px;

  font-size:11px;
  font-family:'DM Mono',monospace;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.08em;
}

input,
textarea{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius2);

  color:var(--text);

  padding:12px 14px;
  font-size:14px;

  outline:none;
  transition:.2s;
}

input:focus,
textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(92,110,248,.15);
}

textarea{
  resize:vertical;
  min-height:110px;
}

input::-webkit-calendar-picker-indicator{
  filter:invert(.8);
  cursor:pointer;
}

/* TOGGLE */

.toggle-row{
  display:flex;
  align-items:center;
  gap:12px;

  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius2);

  padding:14px;
  cursor:pointer;
  margin-bottom:18px;
}

.toggle-row input{
  display:none;
}

.toggle-track{
  width:44px;
  height:24px;
  border-radius:20px;
  background:#2c3144;
  position:relative;
  transition:.25s;
}

.toggle-track::after{
  content:'';
  position:absolute;
  top:3px;
  left:3px;

  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;

  transition:.25s;
}

.toggle-row.active .toggle-track{
  background:var(--accent2);
}

.toggle-row.active .toggle-track::after{
  left:23px;
}

.toggle-sub{
  margin-left:auto;
  font-size:12px;
  color:var(--muted);
}

/* LEAVE */

.leave-banner{
  display:none;

  margin-bottom:18px;

  padding:14px;
  border-radius:var(--radius2);

  background:rgba(248,92,138,.08);
  border:1px solid rgba(248,92,138,.3);

  color:var(--accent2);
  font-size:13px;
}

.leave-banner.show{
  display:block;
}

.hidden{
  display:none;
}

/* BUTTON */

.save-btn,
.export-btn{
  border:none;
  cursor:pointer;
  transition:.2s;
}

.save-btn{
  width:100%;
  padding:14px;

  border-radius:var(--radius2);

  background:var(--accent);
  color:#fff;

  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:15px;
}

.save-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(92,110,248,.3);
}

.export-btn{
  height:45px;
  padding:0 20px;

  background:transparent;
  color:var(--accent);

  border:1px solid var(--accent);
  border-radius:var(--radius2);

  font-family:'Syne',sans-serif;
  font-weight:700;
}

.export-btn:hover{
  background:var(--accent);
  color:#fff;
}

/* EXPORT */

.export-row{
  display:flex;
  gap:10px;
  align-items:flex-end;
}

.export-row .field{
  flex:1;
  margin:0;
}

/* TASK CARDS */

.right-col{
  display:flex;
  flex-direction:column;
  gap:20px;
}

#recentList{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.task-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);

  padding:16px;

  transition:.2s;
}

.task-card:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}

.card-leave{
  border-color:rgba(248,92,138,.3);
}

.card-top{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.card-date{
  font-size:11px;
  font-family:'DM Mono',monospace;
  color:var(--muted);
}

.badge{
  margin-left:auto;

  padding:3px 10px;
  border-radius:20px;

  font-size:10px;
  font-family:'DM Mono',monospace;
  letter-spacing:.08em;
}

.work-badge{
  background:rgba(61,220,132,.12);
  color:var(--green);
}

.leave-badge{
  background:rgba(248,92,138,.12);
  color:var(--accent2);
}

.card-event{
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:700;
  margin-bottom:8px;
}

.card-desc{
  font-size:13px;
  line-height:1.6;
  color:#a5aecb;
}

.loading-msg,
.empty-msg{
  text-align:center;
  color:var(--muted);
  padding:20px 0;
  font-size:13px;
}

/* TOAST */

#toast{
  position:fixed;
  left:50%;
  bottom:30px;

  transform:translateX(-50%) translateY(80px);

  background:var(--surface);
  border:1px solid var(--border);
  border-radius:50px;

  padding:12px 20px;

  opacity:0;
  transition:.3s;
}

#toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

#toast.success{
  color:var(--green);
  border-color:var(--green);
}

#toast.error{
  color:var(--accent2);
  border-color:var(--accent2);
}

/* NOTE */

.firebase-note{
  margin-bottom:18px;

  padding:14px;
  border-radius:var(--radius2);

  background:rgba(248,184,74,.08);
  border:1px solid rgba(248,184,74,.25);

  color:var(--amber);
  font-size:12px;
  line-height:1.6;
}

.firebase-note code{
  background:rgba(248,184,74,.15);
  padding:2px 6px;
  border-radius:4px;
}
</style>
</head>

<body>

<header>
  <div class="logo-icon">📋</div>

  <div class="logo-title">
    Daily<span>Log</span>
  </div>

  <div class="header-sub">
    TASK MANAGER
  </div>
</header>

<div class="main">

  <!-- LEFT -->

  <div class="panel">

    <div class="panel-header">
      <div class="panel-icon" style="background:rgba(92,110,248,.15)">
        ✏️
      </div>

      <div class="panel-title">
        Add Daily Entry
      </div>
    </div>

    <div class="panel-body">

      <div class="firebase-note">
        Replace the <code>firebaseConfig</code> values with your Firebase project credentials.
      </div>

      <form id="taskForm">

        <div class="field">
          <label>Date</label>
          <input type="date" id="taskDate" required>
        </div>

        <div class="field">
          <label>Event / Task Title</label>
          <input type="text" id="taskEvent" placeholder="Sprint Planning, Client Call...">
        </div>

        <label>Day Type</label>

        <label class="toggle-row" id="toggleRow">

          <input type="checkbox" id="leaveToggle">

          <div class="toggle-track"></div>

          <span>Mark as Leave</span>

          <span class="toggle-sub" id="toggleSub">
            Working day
          </span>

        </label>

        <div class="leave-banner" id="leaveBanner">
          🏖️ Leave day — no description required
        </div>

        <div id="descSection">

          <div class="field">
            <label>Description / Work Done</label>

            <textarea id="taskDesc" placeholder="Describe your work..."></textarea>
          </div>

        </div>

        <button type="submit" class="save-btn" id="saveBtn">
          Save Entry
        </button>

      </form>

    </div>
  </div>

  <!-- RIGHT -->

  <div class="right-col">

    <!-- EXPORT -->

    <div class="panel">

      <div class="panel-header">
        <div class="panel-icon" style="background:rgba(61,220,132,.15)">
          📤
        </div>

        <div class="panel-title">
          Export Monthly CSV
        </div>
      </div>

      <div class="panel-body">

        <div class="export-row">

          <div class="field">
            <label>Select Month</label>
            <input type="month" id="exportMonth">
          </div>

          <button class="export-btn" id="exportBtn">
            Export
          </button>

        </div>

      </div>

    </div>

    <!-- RECENT -->

    <div class="panel">

      <div class="panel-header">

        <div class="panel-icon" style="background:rgba(248,92,138,.15)">
          🗂️
        </div>

        <div class="panel-title">
          Recent Entries
        </div>

      </div>

      <div class="panel-body">

        <div id="recentList">
          <div class="loading-msg">
            Loading...
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<div id="toast"></div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  where,
  Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
  
  const firebaseConfig = {
  apiKey: "AIzaSyAH2tTuS7_O4Gs-ys_-5DyPBKMUQFsL-LE",
  authDomain: "task-192b2.firebaseapp.com",
  databaseURL: "https://task-192b2-default-rtdb.firebaseio.com",
  projectId: "task-192b2",
  storageBucket: "task-192b2.firebasestorage.app",
  messagingSenderId: "229241002364",
  appId: "1:229241002364:web:8c54bee46fa79e8bb1ecf9",
  measurementId: "G-42MBCX18NQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* HELPERS */

function pad(n){
  return String(n).padStart(2,'0');
}

function todayStr(){
  const d = new Date();

  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function formatDate(dateStr){

  const [y,m,d] = dateStr.split('-');

  const dt = new Date(y,m-1,d);

  return dt.toLocaleDateString('en-IN',{
    weekday:'short',
    day:'2-digit',
    month:'short',
    year:'numeric'
  });
}

/* TOAST */

let toastTimer;

function showToast(msg,type='success'){

  const toast = document.getElementById('toast');

  toast.textContent = msg;
  toast.className = `show ${type}`;

  clearTimeout(toastTimer);

  toastTimer = setTimeout(()=>{
    toast.className = '';
  },3000);
}

/* TOGGLE */

function toggleLeave(){

  const cb = document.getElementById('leaveToggle');

  const row = document.getElementById('toggleRow');

  const sub = document.getElementById('toggleSub');

  const desc = document.getElementById('descSection');

  const banner = document.getElementById('leaveBanner');

  const active = cb.checked;

  row.classList.toggle('active',active);

  desc.classList.toggle('hidden',active);

  banner.classList.toggle('show',active);

  sub.textContent = active ? 'Leave day' : 'Working day';
}

/* SAVE */

async function saveTask(e){

  e.preventDefault();

  const date = document.getElementById('taskDate').value;

  const event = document.getElementById('taskEvent').value.trim();

  const isLeave = document.getElementById('leaveToggle').checked;

  const desc = isLeave
    ? ''
    : document.getElementById('taskDesc').value.trim();

  if(!date){
    showToast('Select a date','error');
    return;
  }

  if(!isLeave && !desc){
    showToast('Enter task description','error');
    return;
  }

  const btn = document.getElementById('saveBtn');

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try{

    const [y,m,d] = date.split('-').map(Number);

    await addDoc(collection(db,'tasks'),{

      date,

      dateTs: Timestamp.fromDate(
        new Date(y,m-1,d,12,0,0)
      ),

      event: event || (isLeave ? 'Leave' : 'Task'),

      description: desc,

      isLeave,

      createdAt: Timestamp.now()

    });

    showToast('Saved successfully');

    document.getElementById('taskForm').reset();

    document.getElementById('taskDate').value = todayStr();

    toggleLeave();

    loadTasks();

  }catch(err){

    console.error(err);

    showToast('Firebase error','error');

  }finally{

    btn.disabled = false;
    btn.textContent = 'Save Entry';

  }
}

/* BUILD CARD */

function buildCard(data){

  return `
    <div class="task-card ${data.isLeave ? 'card-leave' : ''}">

      <div class="card-top">

        <span class="card-date">
          ${formatDate(data.date)}
        </span>

        <span class="badge ${data.isLeave ? 'leave-badge' : 'work-badge'}">
          ${data.isLeave ? 'LEAVE' : 'WORK'}
        </span>

      </div>

      <div class="card-event">
        ${data.event}
      </div>

      <div class="card-desc">
        ${
          data.isLeave
          ? 'Day off — no task logged.'
          : data.description.replace(/\n/g,'<br>')
        }
      </div>

    </div>
  `;
}

/* LOAD */

async function loadTasks(){

  const list = document.getElementById('recentList');

  list.innerHTML = `
    <div class="loading-msg">
      Loading...
    </div>
  `;

  try{

    const q = query(
      collection(db,'tasks'),
      orderBy('dateTs','desc')
    );

    const snap = await getDocs(q);

    if(snap.empty){

      list.innerHTML = `
        <div class="empty-msg">
          No entries yet
        </div>
      `;

      return;
    }

    let html = '';
    let count = 0;

    snap.forEach(doc=>{

      if(count >= 10) return;

      html += buildCard(doc.data());

      count++;

    });

    list.innerHTML = html;

  }catch(err){

    console.error(err);

    list.innerHTML = `
      <div class="empty-msg">
        Unable to load tasks
      </div>
    `;
  }
}

/* EXPORT */

async function exportCSV(){

  const month = document.getElementById('exportMonth').value;

  if(!month){
    showToast('Select a month','error');
    return;
  }

  const [y,m] = month.split('-').map(Number);

  const start = new Date(y,m-1,1);

  const end = new Date(y,m,0,23,59,59);

  try{

    const q = query(

      collection(db,'tasks'),

      where('dateTs','>=',Timestamp.fromDate(start)),

      where('dateTs','<=',Timestamp.fromDate(end)),

      orderBy('dateTs','asc')

    );

    const snap = await getDocs(q);

    if(snap.empty){

      showToast('No data found','error');

      return;
    }

    const rows = [
      ['Date','Event','Description','Leave']
    ];

    snap.forEach(doc=>{

      const d = doc.data();

      rows.push([
        d.date,
        d.event,
        d.description,
        d.isLeave ? 'Yes' : 'No'
      ]);

    });

    const csv = rows.map(row=>

      row.map(col=>
        `"${String(col).replace(/"/g,'""')}"`
      ).join(',')

    ).join('\n');

    const blob = new Blob([csv],{
      type:'text/csv'
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;

    a.download = `tasks_${month}.csv`;

    a.click();

    URL.revokeObjectURL(url);

    showToast('CSV exported');

  }catch(err){

    console.error(err);

    showToast('Export failed','error');

  }
}

/* INIT */

window.addEventListener('DOMContentLoaded',()=>{

  document.getElementById('taskDate').value = todayStr();

  const now = new Date();

  document.getElementById('exportMonth').value =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}`;

  loadTasks();

});

/* EVENTS */

document
  .getElementById('leaveToggle')
  .addEventListener('change',toggleLeave);

document
  .getElementById('taskForm')
  .addEventListener('submit',saveTask);

document
  .getElementById('exportBtn')
  .addEventListener('click',exportCSV);

</script>

</body>
</html>
